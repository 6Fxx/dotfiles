conky.config = {
    xinerama_head = 1,
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'light gray',
    default_outline_color = 'white',
    default_shade_color = 'white',
    color1 = 'Light Sky Blue',
    color2 = 'Deep Sky Blue',
    color3 = '#1793d1',
    color4 = '#A84550',--[[debian-red]]
    color5 = '#D90429',--[[brighter-red]]
    color6 = '#54AC2B',--[[#green]]
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'Roboto Mono:size=10',
    gap_x = 5,
    gap_y = 37,
    minimum_height = 250,
    minimum_width = 400,
    maximum_width = 400,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_type = 'desktop',
    own_window_hints ='undecorated,sticky,skip_taskbar,skip_pager,below',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 2.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    xftalpha = 1,
    own_window_argb_value = 145,
    own_window_transparent = false,
    imlib_cache_size=0,
    short_units = true
}

conky.text = [[
${color2}${font ConkySymbols:size=16}t${font} ${voffset -10}GNU/Linux » $hr ${color}
#${color1}${goto 35}OS     : ${color}${execi 86400 cat `ls -atr /etc/*-release | tail -2` | grep "PRETTY_NAME" | cut -d= -f2 |  sed 's/"//g'}
${color1}${goto 35}OS     : ${color}${execi 86400 cat /usr/lib/os-release | grep "PRETTY_NAME" | cut -d= -f2 |  sed 's/"//g'}
${color1}${goto 35}Kernel : ${color}$kernel on $machine
${color1}${goto 35}Update : ${color}${texeci 1800 echo $(($(paru -Qu 2>/dev/null | wc -l) - 0))}${font}
${color1}${goto 35}Reboot required : ${color}${execi 1800 test -e /var/run/reboot-required && echo Yes || echo No}${font}

${color2}${font ConkySymbols:size=16}F${font} ${voffset -10} Système » $hr${color}
${color1}${goto 35}CPU : ${color}${freq_g 1}GHz ${alignr}${if_match ${cpu}>80}${color red}${else}${endif}${cpu}% ${cpubar 4,100}
${color1}${goto 35}Uptime : ${color}$uptime_short ${alignr}${color1}Load  : ${color}${loadavg}

${color2}${font ConkySymbols:size=16}H${font} ${voffset -10} Température » $hr${color}
${color1}${goto 35}CPU : ${color}${exec sensors | grep 'temp1' | awk 'NR==1{print $2}'} ${alignr}${color1}GPU intel : ${color}${exec sensors | grep 'temp1' | awk 'NR==2{print $2}'}
${color1}${goto 35}SSD : ${color}${exec sensors | grep 'Composite' | awk 'NR==1{print $2}'} ${alignr}${color1}GPU nvidia : ${color}+${exec nvidia-settings -query [gpu:0]/GPUCoreTemp -t}.0°C

${color2}${font ConkySymbols:size=16}j${font} ${voffset -10}Mémoire » $hr${color}
${color1}${goto 35}RAM  : ${color}$mem / $memmax ${alignr}${if_match ${memperc}>90}${color red}${else}${endif}$memperc% ${membar 4,100}
#${color1}${goto 35}SWAP : ${color}$swap / $swapmax $alignr}${if_match ${swapperc}>90}${color red}${else}${endif}$swapperc% ${swapbar 4,100}
${color1}${goto 35}ZRAM : ${color}${exec /home/francis/.config/conky/zramusage.sh}

${color2}${font ConkySymbols:size=16}N${font} ${voffset -10} Processus » $hr${color}

${color1}${goto 35}CPU usage ${alignr}Memory Usage${color}
${color1}${goto 35}${stippled_hr}${color}
${goto 35}${top name 1} ${color}${top cpu 1}% ${alignr}${top_mem name 1}${top_mem mem_res 1}
${goto 35}${top name 2} ${color}${top cpu 2}% ${alignr}${top_mem name 2}${top_mem mem_res 2}
${goto 35}${top name 3} ${color}${top cpu 3}% ${alignr}${top_mem name 3}${top_mem mem_res 3}
${goto 35}${top name 4} ${color}${top cpu 4}% ${alignr}${top_mem name 4}${top_mem mem_res 4}
${goto 35}${top name 5} ${color}${top cpu 5}% ${alignr}${top_mem name 5}${top_mem mem_res 5}

${color1}${goto 35}Processes: ${color}$processes ${color1}Running: ${color}$running_processes

${color2}${font ConkySymbols:size=16}K${font} ${voffset -10} Stockage » $hr${color}
${color1}${goto 35}ROOT : ${color}${fs_used /} / ${fs_size /} ${alignr}${if_match ${fs_used_perc}>80}${color red}${else}${endif}${fs_used_perc /}% ${fs_bar 4,100 /}
${goto 35}
${color2}${font ConkySymbols:size=16}B${font} ${voffset -10} Réseau » $hr${color}
${color1}${goto 35}SSID          : ${color}${wireless_essid wlan0} ${color1}${alignr}Signal : ${color}${if_match ${wireless_link_qual_perc wlan0}<10}${color red}${else}${endif}${wireless_link_qual_perc wlan0}% ${wireless_link_bar 4,100 wlan0}
${color1}${goto 35}Bitrate       : ${color}${wireless_bitrate wlan0}
${color1}${goto 35}Total Down/Up : ${color}${totaldown wlan0} / ${totalup wlan0}
${color1}${goto 35}Speed Down/Up : ${color}${downspeed wlan0} / ${upspeed wlan0}

${color1}${goto 35}IP wlan : ${color}${addr wlan0}
${color1}${goto 35}IP lan  : ${color}${addr eno2}
${color1}${goto 35}IP wan  : ${color}${execi 1000 wget -q -O- http://ipecho.net/plain;echo}

${color1}${goto 35}Route : ${color}${gw_iface}
${color1}${goto 35}${color}${exec ip route | sed -n "1 p" | cut -c1-45}

${color2}${font ConkySymbols:size=16}I${font} ${voffset -10} Informations » $hr${color}
${color1}${goto 35}${texeci 1000 date "+%A %d %B %Y" }${color1}${alignr}Fête du jour : ${color}${texeci 1000 wget -O - -q  http://fetedujour.fr/  --user-agent="Mozilla/5.0 (Windows NT 5.1; rv:31.0) Gecko/20100101 Firefox/31.0" | grep "<span>Fête du jour" | head -1 | cut -d">" -f4 | cut -d"<" -f1 | sed -e 's/Nativité/Francis/' }

${color1}${goto 35}Météo : ${color}${texeci 3600 curl -s 'wttr.in/bourges?qT0&lang=fr' | sed -n 1'p'}
${font DejaVu Sans Mono:size=10}
${color}${goto 15}${texeci 3600 curl -s 'wttr.in/bourges?qT0&lang=fr' | sed -n 3'p'}
${color}${goto 15}${texeci 3600 curl -s 'wttr.in/bourges?qT0&lang=fr' | sed -n 4'p'}
${color}${goto 15}${texeci 3600 curl -s 'wttr.in/bourges?qT0&lang=fr' | sed -n 5'p' | sed 's/\s\+$//'}
${color}${goto 15}${texeci 3600 curl -s 'wttr.in/bourges?qT0&lang=fr' | sed -n 6'p' | sed 's/\s\+$//'} ${color1}${alignr}Levé : ${color}${texeci 3600 curl -s 'https://wttr.in/bourges?format=%S'}
${color}${goto 15}${texeci 3600 curl -s 'wttr.in/bourges?qT0&lang=fr' | sed -n 7'p' | sed 's/\s\+$//'} ${color1}${alignr}Couché : ${color}${texeci 3600 curl -s 'https://wttr.in/bourges?format=%s'}
${font}
#${color1}${goto 35}Bitcoin : ${color}${texeci 60 /home/francis/.config/conky/bitcoin.sh} USD

]]
